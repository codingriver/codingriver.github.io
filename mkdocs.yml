site_name: codingriver
site_url: https://blog.wgqing.com/
site_author: codingriver
site_description: codingriver personal tech blog - Unity / Shader / CSharp / Math

repo_name: codingriver/codingriver.github.io
repo_url: https://github.com/codingriver/codingriver.github.io
edit_uri: edit/master/docs/

docs_dir: docs

theme:
  name: material
  language: zh
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - navigation.footer
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.action.edit

plugins:
  - search:
      lang: zh
      separator: '[\s\-\.]+'
  - git-revision-date-localized:
      enable_creation_date: true
      type: datetime
      locale: zh
      fallback_to_build_date: true
  - tags

markdown_extensions:
  - tables
  - toc:
      permalink: true
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.inlinehilite
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - Home: index.md
  - About: about.md
