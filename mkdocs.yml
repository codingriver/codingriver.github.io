  - MeshRenderer在Inspector设置SorttingLayerName和SorttingOrder: unity-editor/MeshRenderer在Inspector设置SorttingLayerName和SorttingOrder.md
  - SerializedObject获取所有属性: unity-editor/SerializedObject获取所有属性.md
  - Unity编辑器扩展菜单项: unity-editor/Unity编辑器扩展菜单项.md
  - unity编辑器-自定义Inspector面板: unity-editor/unity编辑器-自定义Inspector面板.md
- Unity 工具:
  - 栏目首页: unityTool/index.md
  - ByteHelper字节数组辅助工具: unityTool/ByteHelper字节数组辅助工具.md
  - JsonHelper工具: unityTool/JsonHelper工具.md
  - Md5计算工具: unityTool/Md5计算工具.md
  - ProfilerHelper辅助工具: unityTool/ProfilerHelper辅助工具.md
  - StringHelper编码辅助工具: unityTool/StringHelper编码辅助工具.md
  - URLHelper-URL编码解码工具: unityTool/URLHelper-URL编码解码工具.md
  - Unity-Assert断言工具: unityTool/Unity-Assert断言工具.md
  - ZipHelper压缩工具: unityTool/ZipHelper压缩工具.md
  - 生成分布式唯一ID: unityTool/生成分布式唯一ID.md
  - 遍历打印对象的所有变量和属性: unityTool/遍历打印对象的所有变量和属性.md
plugins:
  - search
  - glightbox
  - minify:
      minify_html: true
      htmlmin_opts:
        remove_optional_attribute_quotes: false
  - git-revision-date-localized:
      enable_creation_date: true
      type: datetime
      timezone: Asia/Shanghai
      locale: zh
  - git-authors

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - abbr
  - attr_list
  - md_in_html
  - footnotes
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
      linenums: true
      linenums_style: table
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.mark
  - pymdownx.critic
  - pymdownx.caret
  - pymdownx.tilde
  - pymdownx.smartsymbols
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.keys
  - pymdownx.snippets

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

extra_css:
  - stylesheets/extra.css
